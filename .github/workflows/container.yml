name: Container Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registry'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write
  security-events: write  # For SARIF upload

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy-editor

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: taxonomy-editor/Dockerfile
          failure-threshold: error

      - name: Verify base image exists
        run: |
          BASE_TAG=$(grep -oP 'FROM ghcr\.io/jpsnover/ai-triad-base:\K\S+' taxonomy-editor/Dockerfile | head -1)
          BASE_TAG="${BASE_TAG%% *}"
          echo "Base image tag: $BASE_TAG"
          if [ "$BASE_TAG" = "latest" ]; then
            echo "Using :latest — checking it exists..."
          fi
          TAGS=$(gh api user/packages/container/ai-triad-base/versions --jq '.[].metadata.container.tags[]' 2>/dev/null || echo "")
          if echo "$TAGS" | grep -qx "$BASE_TAG"; then
            echo "Base image ghcr.io/jpsnover/ai-triad-base:$BASE_TAG exists"
          else
            echo "::error::Base image tag '$BASE_TAG' not found in GHCR. Available tags: $(echo $TAGS | tr '\n' ', ')"
            echo "Run the base-image workflow first, or update the Dockerfile to use an existing tag."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Fetch taxonomy snapshot for fallback
        id: snapshot
        continue-on-error: true
        run: |
          echo "Fetching taxonomy snapshot from ai-triad-data for baked fallback..."
          SNAP="taxonomy-snapshot/taxonomy/Origin"
          mkdir -p "$SNAP"

          REPO="jpsnover/ai-triad-data"
          FAILED=0
          for f in accelerationist.json safetyist.json skeptic.json cross-cutting.json edges.json policy_actions.json embeddings.json; do
            gh api "repos/${REPO}/contents/taxonomy/Origin/${f}" \
              --jq '.content' | base64 -d > "${SNAP}/${f}" 2>/dev/null \
              || { echo "::warning::Failed to fetch ${f}"; FAILED=$((FAILED+1)); }
          done

          # Fetch conflict index (single file replaces 1,244 individual files)
          mkdir -p taxonomy-snapshot/conflicts
          gh api "repos/${REPO}/contents/conflicts/_conflict-index.json" \
            --jq '.content' | base64 -d > taxonomy-snapshot/conflicts/_conflict-index.json 2>/dev/null \
            || echo "::warning::Conflict index not available yet"

          # Fetch conflict clusters
          gh api "repos/${REPO}/contents/conflicts/_conflict-clusters.json" \
            --jq '.content' | base64 -d > taxonomy-snapshot/conflicts/_conflict-clusters.json 2>/dev/null \
            || echo "::warning::Conflict clusters not available yet"

          # Stamp snapshot age for read-only mode banner
          echo "{\"generated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"commit\":\"$(gh api repos/${REPO}/commits/main --jq '.sha' 2>/dev/null || echo 'unknown')\"}" \
            > taxonomy-snapshot/snapshot-meta.json

          # Validate minimum viable snapshot (5 taxonomy POV files + edges + policy registry)
          REQUIRED="accelerationist.json safetyist.json skeptic.json cross-cutting.json edges.json policy_actions.json"
          MISSING=0
          for f in $REQUIRED; do
            if [ ! -s "${SNAP}/${f}" ]; then
              echo "::warning::Required file ${f} is missing or empty"
              MISSING=$((MISSING+1))
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::${MISSING} required taxonomy files missing — fallback will be incomplete"
            echo "valid=false" >> $GITHUB_OUTPUT
          else
            TOTAL_SIZE=$(du -sh taxonomy-snapshot/ | cut -f1)
            echo "Snapshot fetched successfully (${TOTAL_SIZE})"
            echo "valid=true" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Ensure snapshot directory exists
        if: always()
        run: |
          # Guarantee taxonomy-snapshot/ exists for the Dockerfile COPY layer.
          # If the fetch step was skipped or failed, create a minimal stub
          # so the build succeeds (fallback will just be empty).
          mkdir -p taxonomy-snapshot
          if [ ! -f taxonomy-snapshot/snapshot-meta.json ]; then
            echo '{"generated":"none","commit":"none","empty":true}' > taxonomy-snapshot/snapshot-meta.json
          fi

      - name: Determine push mode
        id: push_mode
        run: |
          if [[ "${{ github.event_name }}" == "push" ]] || [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.push }}" == "true" ]]; then
            echo "push=true" >> $GITHUB_OUTPUT
            echo "load=false" >> $GITHUB_OUTPUT
          else
            echo "push=false" >> $GITHUB_OUTPUT
            echo "load=true" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: taxonomy-editor/Dockerfile
          push: ${{ steps.push_mode.outputs.push }}
          load: ${{ steps.push_mode.outputs.load }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.6

      - name: Scan image with Trivy
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.31.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          skip-setup-trivy: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Image size report
        if: success()
        run: docker images ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
