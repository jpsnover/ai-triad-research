name: Cleanup stale session branches

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM UTC
  workflow_dispatch: {}   # Manual trigger

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete stale api-session branches
        uses: actions/github-script@v7
        with:
          script: |
            const STALE_DAYS = 30;
            const cutoff = Date.now() - STALE_DAYS * 24 * 60 * 60 * 1000;
            const deleted = [];

            // List all refs under api-session/
            const { data: refs } = await github.rest.git.listMatchingRefs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'heads/api-session/',
            });

            for (const ref of refs) {
              const branch = ref.ref.replace('refs/heads/', '');

              // Get last commit date
              const { data: [commit] } = await github.rest.repos.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: branch,
                per_page: 1,
              });

              if (!commit) continue;

              const lastCommitDate = new Date(commit.commit.committer.date).getTime();
              if (lastCommitDate > cutoff) continue;

              // Check for open PRs from this branch
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                state: 'open',
              });

              if (prs.length > 0) continue;

              // Delete the stale branch
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });

              deleted.push(branch);
              core.info(`Deleted stale branch: ${branch} (last commit: ${commit.commit.committer.date})`);
            }

            if (deleted.length > 0) {
              core.summary.addHeading('Stale Session Branches Cleaned Up', 3);
              core.summary.addList(deleted.map(b => `\`${b}\``));
              await core.summary.write();
            } else {
              core.info('No stale session branches found.');
            }
