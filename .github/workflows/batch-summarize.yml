# batch-summarize.yml
# Triggered when TAXONOMY_VERSION is updated.
# Runs the smart batch summarization script.

name: Batch POV Summarization

on:
  push:
    branches: [main]
    paths:
      - 'TAXONOMY_VERSION'

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 120    # Large batches may take time

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2    # Need parent commit to diff taxonomy changes

      - name: Checkout sources repo
        uses: actions/checkout@v4
        with:
          repository: jpsnover/ai-triad-sources
          path: ai-triad-sources
          token: ${{ secrets.DATA_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Show taxonomy version
        run: |
          echo "Taxonomy version: $(cat TAXONOMY_VERSION)"
          echo "Changed files: $(git diff HEAD~1 HEAD --name-only)"

      - name: Run smart batch summarization
        shell: pwsh
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL:   ${{ vars.AI_MODEL || 'claude-sonnet-4-6' }}
          AI_TRIAD_SOURCES_ROOT: ${{ github.workspace }}/ai-triad-sources
        run: |
          Import-Module ./scripts/AITriad -Force
          Invoke-BatchSummary -ForceAll

      - name: Commit updated summaries
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update summaries to taxonomy $(cat TAXONOMY_VERSION)"
          file_pattern: 'summaries/*.json conflicts/*.json'
