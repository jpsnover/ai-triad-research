name: Auto-Deploy to Staging

# Automatically deploys to staging after a successful container image build.
# Production deploys remain manual (via deploy-azure.yml workflow_dispatch).

on:
  workflow_run:
    workflows: ["Container Image"]
    types: [completed]

permissions:
  contents: read
  packages: read
  id-token: write  # For Azure OIDC login

concurrency:
  group: deploy-staging
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy-editor
  RESOURCE_GROUP: ai-triad
  CONTAINER_APP_NAME: taxonomy-editor-staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag from triggering workflow
        id: resolve_tag
        run: |
          # Extract the version from the triggering workflow's ref (e.g., refs/tags/v0.8.0)
          REF="${{ github.event.workflow_run.head_branch }}"
          TAG="${REF#v}"
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi
          echo "Deploying tag: $(grep tag= $GITHUB_OUTPUT | cut -d= -f2)"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy new revision to staging
        run: |
          SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }} \
            --revision-suffix "staging-${SHORT_SHA}" \
            --set-env-vars "DEPLOY_SHA=${{ github.event.workflow_run.head_sha }}" "DEPLOY_TAG=${{ steps.resolve_tag.outputs.tag }}"

      - name: Verify staging health
        run: |
          APP_FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          APP_URL="https://${APP_FQDN}"
          echo "Staging URL: $APP_URL"

          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Staging health check passed!"
              exit 0
            fi
            echo "Waiting... (attempt $i/18, status: $STATUS)"
            sleep 10
          done

          echo "::error::Staging health check failed after 3 minutes"
          exit 1
