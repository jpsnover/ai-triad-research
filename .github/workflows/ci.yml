name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: jpsnover/ai-triad-data
          path: ../ai-triad-data
          fetch-depth: 1

      - name: Validate PowerShell file encoding (UTF-8 BOM)
        shell: pwsh
        run: |
          # Windows PowerShell 5.1 reads BOM-less files as Windows-1252, which
          # mangles multi-byte UTF-8 sequences (em-dashes, box-drawing chars)
          # and produces cascading parse errors. CI runs on pwsh 7 where this
          # is silent, so we validate the BOM explicitly to keep 5.1 working.
          $bad = @()
          Get-ChildItem scripts/AITriad -Recurse -Include *.ps1,*.psm1,*.psd1,*.ps1xml |
            ForEach-Object {
              $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
              $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
              $nonAscii = 0
              foreach ($b in $bytes) { if ($b -gt 127) { $nonAscii++; break } }
              if ($nonAscii -gt 0 -and -not $hasBom) { $bad += $_.FullName }
            }
          if ($bad.Count -gt 0) {
            Write-Host "::error::PowerShell files with non-ASCII content must be UTF-8 with BOM (required for Windows PowerShell 5.1):"
            $bad | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "All PowerShell files with non-ASCII content have a UTF-8 BOM."

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Build module
        shell: pwsh
        run: ./scripts/Build-Module.ps1 -Clean

      - name: Validate built manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./build/AITriad/AITriad.psd1

  test-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: taxonomy-editor
        run: npm ci

      - name: TypeScript check (main)
        working-directory: taxonomy-editor
        run: npx tsc --noEmit -p tsconfig.main.json

      - name: Build
        working-directory: taxonomy-editor
        run: npm run build
