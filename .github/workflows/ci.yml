name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: jpsnover/ai-triad-data
          path: ai-triad-data
          fetch-depth: 1

      - name: Symlink data repo to expected location
        run: ln -s "$GITHUB_WORKSPACE/ai-triad-data" ../ai-triad-data
        continue-on-error: true

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Build module
        shell: pwsh
        run: ./scripts/Build-Module.ps1 -Clean

      - name: Validate built manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./build/AITriad/AITriad.psd1

  test-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: taxonomy-editor/package-lock.json

      - name: Install dependencies
        working-directory: taxonomy-editor
        run: npm ci

      - name: Lint
        working-directory: taxonomy-editor
        run: npm run lint
        if: hashFiles('taxonomy-editor/eslint.config.*') != ''

      - name: TypeScript check (main)
        working-directory: taxonomy-editor
        run: npx tsc --noEmit -p tsconfig.main.json

      - name: Build
        working-directory: taxonomy-editor
        run: npm run build

  test-container:
    needs: [test-powershell, test-electron]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: taxonomy-editor/Dockerfile
          failure-threshold: error

      - name: Lint base Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/azure/Dockerfile.base
          failure-threshold: error

      - name: Create taxonomy-snapshot stub for Dockerfile COPY layer
        run: |
          mkdir -p taxonomy-snapshot
          echo '{"generated":"none","commit":"none","empty":true}' > taxonomy-snapshot/snapshot-meta.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract base image tag from Dockerfile
        id: base_tag
        run: |
          TAG=$(grep -oP 'FROM ghcr\.io/jpsnover/ai-triad-base:\K\S+' taxonomy-editor/Dockerfile | head -1)
          echo "tag=${TAG%% *}" >> $GITHUB_OUTPUT
          echo "Base image tag: $TAG"

      - name: Build base image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/azure/Dockerfile.base
          push: false
          load: true
          tags: ghcr.io/jpsnover/ai-triad-base:${{ steps.base_tag.outputs.tag }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,scope=base-image,mode=max

      - name: Build app container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: taxonomy-editor/Dockerfile
          push: false
          load: true
          tags: ai-triad-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test (GitHub API-first mode)
        run: |
          # No data volume mounted — the app starts with baked fallback data
          # and fetches from GitHub API. In CI we just verify it starts cleanly.
          docker run -d --name smoke-test -p 7862:7862 \
            -e AUTH_DISABLED=1 \
            -e DEPLOY_TAG=ci-test \
            ai-triad-test:ci
          echo "Waiting for container to start..."

          # Health check: 18 × 5s = 90s
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7862/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i!"
              break
            fi
            echo "  Attempt $i/18 — status: $STATUS"
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::Container smoke test failed — health check did not pass"
            docker logs smoke-test
            exit 1
          fi

          # Verify health response structure
          HEALTH=$(curl -s http://localhost:7862/health)
          echo "Health response:"
          echo "$HEALTH" | python3 -m json.tool 2>/dev/null || echo "$HEALTH"

          # Verify /healthz (liveness probe endpoint)
          HZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7862/healthz)
          if [ "$HZ_STATUS" = "200" ]; then
            echo "Liveness probe (/healthz) passed!"
          else
            echo "::error::/healthz returned $HZ_STATUS — liveness probe would fail"
            docker logs smoke-test
            exit 1
          fi

          # Check data availability (may be false in CI without GitHub credentials — that's OK)
          DATA_AVAILABLE=$(curl -s http://localhost:7862/api/data/available)
          echo "Data available: $DATA_AVAILABLE"
          if [ "$DATA_AVAILABLE" = "true" ]; then
            echo "Data availability check passed (fallback data loaded)"
          else
            echo "::warning::Data not available in CI — expected without GitHub App credentials"
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test || true
