name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: jpsnover/ai-triad-data
          path: ai-triad-data
          fetch-depth: 1

      - name: Symlink data repo to expected location
        run: ln -s "$GITHUB_WORKSPACE/ai-triad-data" ../ai-triad-data
        continue-on-error: true

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Build module
        shell: pwsh
        run: ./scripts/Build-Module.ps1 -Clean

      - name: Validate built manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./build/AITriad/AITriad.psd1

  test-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: taxonomy-editor/package-lock.json

      - name: Install dependencies
        working-directory: taxonomy-editor
        run: npm ci

      - name: Lint
        working-directory: taxonomy-editor
        run: npm run lint
        if: hashFiles('taxonomy-editor/eslint.config.*') != ''

      - name: TypeScript check (main)
        working-directory: taxonomy-editor
        run: npx tsc --noEmit -p tsconfig.main.json

      - name: Build
        working-directory: taxonomy-editor
        run: npm run build

  test-container:
    needs: [test-powershell, test-electron]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: taxonomy-editor/Dockerfile
          failure-threshold: error

      - name: Lint base Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: deploy/azure/Dockerfile.base
          failure-threshold: error

      - name: Create taxonomy-snapshot stub for Dockerfile COPY layer
        run: |
          mkdir -p taxonomy-snapshot
          echo '{"generated":"none","commit":"none","empty":true}' > taxonomy-snapshot/snapshot-meta.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract base image tag from Dockerfile
        id: base_tag
        run: |
          TAG=$(grep -oP 'FROM ghcr\.io/jpsnover/ai-triad-base:\K\S+' taxonomy-editor/Dockerfile | head -1)
          echo "tag=${TAG%% *}" >> $GITHUB_OUTPUT
          echo "Base image tag: $TAG"

      - name: Build base image locally
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/azure/Dockerfile.base
          push: false
          load: true
          tags: ghcr.io/jpsnover/ai-triad-base:${{ steps.base_tag.outputs.tag }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,scope=base-image,mode=max

      - name: Build app container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: taxonomy-editor/Dockerfile
          push: false
          load: true
          tags: ai-triad-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create minimal test data
        run: |
          mkdir -p /tmp/test-data/taxonomy/Origin
          echo '{"nodes":[]}' > /tmp/test-data/taxonomy/Origin/accelerationist.json
          echo '{"nodes":[]}' > /tmp/test-data/taxonomy/Origin/safetyist.json
          echo '{"nodes":[]}' > /tmp/test-data/taxonomy/Origin/skeptic.json
          echo '{"nodes":[]}' > /tmp/test-data/taxonomy/Origin/cross-cutting.json
          echo '{"edges":[]}' > /tmp/test-data/taxonomy/Origin/edges.json
          echo '{}' > /tmp/test-data/taxonomy/Origin/policy_actions.json

      - name: Run container smoke test (entrypoint copy path)
        run: |
          # Mount test data at /data-persistent (like Azure Files in production).
          # The entrypoint copies it to /data in the background.
          docker run -d --name smoke-test -p 7862:7862 \
            -e AI_TRIAD_DATA_ROOT=/data \
            -e AUTH_DISABLED=1 \
            -e DEPLOY_TAG=ci-test \
            -v /tmp/test-data:/data-persistent:ro \
            ai-triad-test:ci
          echo "Waiting for container to start..."

          # Health check: 30 × 5s = 2.5 min (must pass within startup probe window)
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:7862/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i!"
              break
            fi
            echo "  Attempt $i/30 — status: $STATUS"
            sleep 5
          done

          if [ "$STATUS" != "200" ]; then
            echo "::error::Container smoke test failed — health check did not pass within probe window"
            docker logs smoke-test
            exit 1
          fi

          # Wait for background data copy to complete (check entrypoint logs)
          echo "Waiting for background data copy..."
          for i in $(seq 1 12); do
            if docker logs smoke-test 2>&1 | grep -q "Copy complete\|copy complete\|empty or missing"; then
              echo "Data copy finished!"
              break
            fi
            sleep 5
          done

          # Verify entrypoint structured logging is present
          LOGS=$(docker logs smoke-test 2>&1)
          echo "$LOGS" | head -20
          if ! echo "$LOGS" | grep -q "\[entrypoint\]"; then
            echo "::error::Entrypoint structured logging not found in output"
            exit 1
          fi

          # Verify the app can see the taxonomy data
          DATA_AVAILABLE=$(curl -s http://localhost:7862/api/data/available)
          echo "Data available: $DATA_AVAILABLE"
          if echo "$DATA_AVAILABLE" | grep -q "true"; then
            echo "Data availability check passed!"
          else
            echo "::warning::Data not available — may be expected if test data is minimal"
          fi

      - name: Cleanup
        if: always()
        run: docker rm -f smoke-test || true
