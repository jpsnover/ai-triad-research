name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-powershell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          repository: jpsnover/ai-triad-data
          path: ../ai-triad-data
          fetch-depth: 1

      - name: Validate Windows PowerShell 5.1 compatibility
        shell: pwsh
        run: |
          # The AITriad module manifest declares PowerShellVersion = '5.1' as
          # a hard requirement. CI runs on pwsh 7 where several 5.1 breakages
          # are silent, so we enforce them explicitly here. Two classes:
          #   1. UTF-8 without BOM — 5.1 reads BOM-less files as Windows-1252
          #      and mangles multi-byte UTF-8 (em-dashes, box-drawing chars).
          #   2. PS 6/7-only syntax that is a PARSE-TIME breaker in 5.1 — i.e.
          #      the file fails to tokenize, so the whole module fails to load.
          #      Runtime-only incompatibilities (e.g. ForEach-Object -Parallel)
          #      are NOT checked here because they can be guarded at runtime
          #      and do not block module import.
          $files = Get-ChildItem scripts -Recurse -Include *.ps1,*.psm1,*.psd1,*.ps1xml
          $bomBad = @()
          $synBad = @()

          # Parse-time breakers — files containing these will not tokenize in 5.1
          $forbidden = @(
            @{ Name = 'PS 7+ unicode escape (`u{NNNN})'; Pattern = '`u\{[0-9A-Fa-f]+\}' }
            @{ Name = '-AsByteStream (PS 6+)';           Pattern = '-AsByteStream\b' }
            @{ Name = 'ConvertFrom-Json -AsHashtable (PS 6+)'; Pattern = 'ConvertFrom-Json[^|\r\n]*-AsHashtable\b' }
            @{ Name = 'null-coalescing ?? (PS 7+)';      Pattern = '[^\s]\s*\?\?\s*[^\s]' }
            @{ Name = 'null-conditional ?. (PS 7+)';     Pattern = '\$\w+\?\.' }
            @{ Name = 'ternary ? : (PS 7+)';             Pattern = '\)\s*\?\s*[^=\s][^:\r\n]*\s:\s' }
          )

          # Blank out comments while preserving line numbers so regex line
          # reporting stays accurate. Both <# ... #> block comments and `#` line
          # comments are stripped — pattern hits inside comments are not real
          # code and must not fail the build (common case: this CI file itself
          # references forbidden patterns in comments explaining what they are).
          function Strip-Comments([string]$s) {
            $s = [regex]::Replace($s, '(?s)<#.*?#>', {
              param($m) ($m.Value -replace '[^\r\n]', ' ')
            })
            $s = [regex]::Replace($s, '(?m)#[^\r\n]*', {
              param($m) ' ' * $m.Value.Length
            })
            return $s
          }

          foreach ($f in $files) {
            $bytes = [System.IO.File]::ReadAllBytes($f.FullName)
            $hasBom = $bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF
            $nonAscii = $false
            foreach ($b in $bytes) { if ($b -gt 127) { $nonAscii = $true; break } }
            if ($nonAscii -and -not $hasBom) { $bomBad += $f.FullName }

            $text = [System.IO.File]::ReadAllText($f.FullName)
            $codeText = Strip-Comments $text
            foreach ($rule in $forbidden) {
              $matches = [regex]::Matches($codeText, $rule.Pattern)
              foreach ($m in $matches) {
                # Compute line number from offset (use original text — offsets match since we blanked in place)
                $line = ($text.Substring(0, $m.Index) -split "`n").Count
                $synBad += [pscustomobject]@{
                  File = $f.FullName; Line = $line; Rule = $rule.Name; Match = $m.Value.Trim()
                }
              }
            }
          }

          $failed = $false

          if ($bomBad.Count -gt 0) {
            $failed = $true
            Write-Host "::error::PowerShell files with non-ASCII content must be UTF-8 with BOM (required for Windows PowerShell 5.1):"
            $bomBad | ForEach-Object { Write-Host "  $_" }
          }

          if ($synBad.Count -gt 0) {
            $failed = $true
            Write-Host "::error::PowerShell 6/7-only syntax found (not supported in Windows PowerShell 5.1):"
            $synBad | ForEach-Object { Write-Host ("  {0}:{1} [{2}] — {3}" -f $_.File, $_.Line, $_.Rule, $_.Match) }
          }

          if ($failed) { exit 1 }
          Write-Host "Windows PowerShell 5.1 compatibility checks passed ($($files.Count) files)."

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests/'
          $config.Output.Verbosity = 'Detailed'
          $config.Run.Exit = $true
          Invoke-Pester -Configuration $config

      - name: Build module
        shell: pwsh
        run: ./scripts/Build-Module.ps1 -Clean

      - name: Validate built manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./build/AITriad/AITriad.psd1

  test-electron:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: taxonomy-editor
        run: npm ci

      - name: TypeScript check (main)
        working-directory: taxonomy-editor
        run: npx tsc --noEmit -p tsconfig.main.json

      - name: Build
        working-directory: taxonomy-editor
        run: npm run build
