name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: 'Image tag to deploy (e.g., 0.8.0). Leave empty for latest tagged version.'
        required: false
        default: ''
        type: string
      enable_auth:
        description: 'Enforce sign-in gate (requires authorized-users.json on data volume)'
        required: false
        default: false
        type: boolean
      enable_git_sync:
        description: 'Enable GitHub data-sync feature (requires GH_* secrets set)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: read
  id-token: write  # For Azure OIDC login

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy-editor
  RESOURCE_GROUP: ai-triad
  CONTAINER_APP_NAME: taxonomy-editor

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            # Use the git tag name if triggered from a tag context, else 'latest'
            TAG="${GITHUB_REF_NAME#v}"
            if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "tag=$TAG" >> $GITHUB_OUTPUT
            else
              echo "::warning::No explicit tag provided and not on a version ref — falling back to 'latest'"
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Deploying image tag: $(cat $GITHUB_OUTPUT | grep tag= | cut -d= -f2)"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Preview Bicep changes (what-if)
        run: |
          echo "Previewing infrastructure changes..."
          RESULT=$(az deployment group what-if \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --template-file deploy/azure/main.bicep \
            --parameters \
              containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }} \
              googleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
              googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
              githubClientId=${{ secrets.GH_OAUTH_CLIENT_ID }} \
              githubClientSecret=${{ secrets.GH_OAUTH_CLIENT_SECRET }} \
              authDisabled=${{ inputs.enable_auth && '' || '1' }} \
              gitSyncEnabled=${{ inputs.enable_git_sync && '1' || '' }} \
              githubRepo=${{ vars.SYNC_GITHUB_REPO }} \
              githubAppId=${{ vars.SYNC_GITHUB_APP_ID }} \
              githubAppInstallationId=${{ vars.SYNC_GITHUB_APP_INSTALLATION_ID }} \
              githubAppPrivateKeySecretName=${{ vars.SYNC_GITHUB_APP_PRIVATE_KEY_SECRET_NAME }} \
              githubWebhookSecret=${{ secrets.SYNC_GITHUB_WEBHOOK_SECRET }} \
              ghcrPassword=${{ secrets.GHCR_PAT }} \
            --no-pretty-print 2>&1) || true
          echo "$RESULT"

          # Fail on unexpected deletes (but allow NoChange and Modify)
          if echo "$RESULT" | grep -q '"changeType":"Delete"'; then
            echo "::error::Bicep what-if detected resource DELETIONS — review before deploying"
            exit 1
          fi

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: deploy/azure/main.bicep
          parameters: >-
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }}
            googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
            githubClientId=${{ secrets.GH_OAUTH_CLIENT_ID }}
            githubClientSecret=${{ secrets.GH_OAUTH_CLIENT_SECRET }}
            authDisabled=${{ inputs.enable_auth && '' || '1' }}
            gitSyncEnabled=${{ inputs.enable_git_sync && '1' || '' }}
            githubRepo=${{ vars.SYNC_GITHUB_REPO }}
            githubAppId=${{ vars.SYNC_GITHUB_APP_ID }}
            githubAppInstallationId=${{ vars.SYNC_GITHUB_APP_INSTALLATION_ID }}
            githubAppPrivateKeySecretName=${{ vars.SYNC_GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
            githubWebhookSecret=${{ secrets.SYNC_GITHUB_WEBHOOK_SECRET }}
            ghcrPassword=${{ secrets.GHCR_PAT }}

      - name: Get current active revision
        id: current_revision
        run: |
          CURRENT=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          echo "revision=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current active revision: $CURRENT"

      - name: Cleanup stale revisions
        run: |
          echo "Deactivating stale revisions to free resources..."
          ACTIVE="${{ steps.current_revision.outputs.revision }}"
          STALE=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.active && properties.trafficWeight == \`0\`].name" -o tsv)
          for rev in $STALE; do
            if [ "$rev" != "$ACTIVE" ]; then
              echo "  Deactivating: $rev"
              az containerapp revision deactivate \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.RESOURCE_GROUP }} \
                --revision "$rev" 2>/dev/null || true
            fi
          done
          echo "Cleanup complete"

      - name: Deploy new revision (0% traffic)
        id: new_revision
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SUFFIX="deploy-${SHORT_SHA}-$(date +%s | tail -c 5)"
          NEW_REV="${{ env.CONTAINER_APP_NAME }}--${SUFFIX}"

          # Deploy new revision — in Multiple mode it starts with 0% traffic
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }} \
            --revision-suffix "$SUFFIX" \
            --set-env-vars "DEPLOY_SHA=${{ github.sha }}" "DEPLOY_TAG=${{ steps.resolve_tag.outputs.tag }}"

          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT
          echo "revision=$NEW_REV" >> $GITHUB_OUTPUT

      - name: Health check new revision
        id: health_check
        run: |
          # Get the revision-specific FQDN to test the new revision directly
          REV_FQDN=$(az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.new_revision.outputs.revision }}" \
            --query "properties.fqdn" -o tsv 2>/dev/null || echo "")

          # Fall back to main app URL if revision FQDN unavailable
          if [ -z "$REV_FQDN" ]; then
            HEALTH_URL="${{ steps.deploy.outputs.appUrl }}/health"
          else
            HEALTH_URL="https://${REV_FQDN}/health"
          fi
          echo "Health check URL: $HEALTH_URL"

          # 30 attempts × 10s = 5 min — allows time for data copy + app init
          # --max-time 15 prevents Envoy 504 gateway timeouts (~4min each) from
          # turning a 5-minute check into a 2-hour wait.
          HEALTHY="false"
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 --connect-timeout 5 "$HEALTH_URL" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              HEALTHY="true"
              break
            fi
            echo "Waiting for container to start... (attempt $i/30, status: $STATUS)"
            sleep 10
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT
          if [ "$HEALTHY" != "true" ]; then
            echo "::error::Health check failed after 5 minutes"
          fi

      - name: Shift traffic to new revision
        if: steps.health_check.outputs.healthy == 'true'
        run: |
          echo "New revision healthy — waiting for provisioning to settle..."
          sleep 30

          for attempt in 1 2 3 4 5; do
            if az containerapp ingress traffic set \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --revision-weight "${{ steps.new_revision.outputs.revision }}=100" 2>&1; then
              echo "Traffic shifted to ${{ steps.new_revision.outputs.revision }}"
              exit 0
            fi
            echo "Traffic shift attempt $attempt/5 failed (provisioning in progress) — retrying in 30s..."
            sleep 30
          done
          echo "::error::Traffic shift failed after 5 attempts"
          exit 1

      - name: Collect failure diagnostics
        if: steps.health_check.outputs.healthy != 'true'
        run: |
          echo "=== Revision Status ==="
          az containerapp revision show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.new_revision.outputs.revision }}" \
            --query "{state:properties.runningState,health:properties.healthState,replicas:properties.replicas,reason:properties.statusMessage}" \
            -o table 2>/dev/null || echo "(revision not found)"

          echo ""
          echo "=== Container Console Logs (last 100 lines) ==="
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.new_revision.outputs.revision }}" \
            --type console --tail 100 2>/dev/null || echo "(no console logs)"

          echo ""
          echo "=== System Events (last 50) ==="
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --type system --tail 50 2>/dev/null || echo "(no system logs)"

      - name: Re-authenticate before rollback
        if: steps.health_check.outputs.healthy != 'true' && steps.current_revision.outputs.revision != ''
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback on failure
        if: steps.health_check.outputs.healthy != 'true' && steps.current_revision.outputs.revision != ''
        run: |
          echo "::error::New revision unhealthy — rolling back to ${{ steps.current_revision.outputs.revision }}"
          # Deactivate the failed revision
          az containerapp revision deactivate \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "${{ steps.new_revision.outputs.revision }}" || true
          # Ensure previous revision keeps 100% traffic
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision-weight "${{ steps.current_revision.outputs.revision }}=100"
          echo "Rollback complete. Previous revision restored."
          exit 1

      - name: Fail if unhealthy (no previous revision to rollback to)
        if: steps.health_check.outputs.healthy != 'true' && steps.current_revision.outputs.revision == ''
        run: |
          echo "::error::Health check failed and no previous revision exists for rollback"
          exit 1

      - name: Trigger data-repo initialization
        if: inputs.enable_git_sync && steps.health_check.outputs.healthy == 'true'
        run: |
          APP_URL="${{ steps.deploy.outputs.appUrl }}"
          echo "Triggering git data-repo init via ${APP_URL}/api/sync/init..."
          RESULT=$(curl -s -X POST "${APP_URL}/api/sync/init" -H "Content-Type: application/json")
          echo "$RESULT" | jq .
          OK=$(echo "$RESULT" | jq -r '.ok // false')
          if [ "$OK" != "true" ]; then
            echo "::warning::Data-repo init returned ok=$OK — the app will retry on next restart"
          fi
