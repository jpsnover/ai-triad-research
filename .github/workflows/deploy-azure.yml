name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      image_tag:
        description: 'Image tag to deploy (e.g., 0.8.0). Leave empty for latest tagged version.'
        required: false
        default: ''
        type: string
      enable_auth:
        description: 'Enforce sign-in gate (requires authorized-users.json on data volume)'
        required: false
        default: false
        type: boolean
      enable_git_sync:
        description: 'Enable GitHub data-sync feature (requires GH_* secrets set)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: read
  id-token: write  # For Azure OIDC login

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy-editor
  RESOURCE_GROUP: ai-triad
  CONTAINER_APP_NAME: taxonomy-editor

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: resolve_tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            # Use the git tag name if triggered from a tag context, else 'latest'
            TAG="${GITHUB_REF_NAME#v}"
            if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
              echo "tag=$TAG" >> $GITHUB_OUTPUT
            else
              echo "::warning::No explicit tag provided and not on a version ref — falling back to 'latest'"
              echo "tag=latest" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Deploying image tag: $(cat $GITHUB_OUTPUT | grep tag= | cut -d= -f2)"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: deploy/azure/main.bicep
          parameters: >-
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }}
            googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
            githubClientId=${{ secrets.GH_OAUTH_CLIENT_ID }}
            githubClientSecret=${{ secrets.GH_OAUTH_CLIENT_SECRET }}
            authDisabled=${{ inputs.enable_auth && '' || '1' }}
            gitSyncEnabled=${{ inputs.enable_git_sync && '1' || '' }}
            githubRepo=${{ vars.SYNC_GITHUB_REPO }}
            githubAppId=${{ vars.SYNC_GITHUB_APP_ID }}
            githubAppInstallationId=${{ vars.SYNC_GITHUB_APP_INSTALLATION_ID }}
            githubAppPrivateKeySecretName=${{ vars.SYNC_GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
            githubWebhookSecret=${{ secrets.SYNC_GITHUB_WEBHOOK_SECRET }}
            ghcrPassword=${{ secrets.GHCR_PAT }}

      - name: Get current active revision
        id: current_revision
        run: |
          CURRENT=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[?properties.trafficWeight > \`0\`].name | [0]" -o tsv)
          echo "revision=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current active revision: $CURRENT"

      - name: Deploy new revision
        id: new_revision
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SUFFIX="deploy-${SHORT_SHA}"
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }} \
            --revision-suffix "$SUFFIX" \
            --set-env-vars "DEPLOY_SHA=${{ github.sha }}" "DEPLOY_TAG=${{ steps.resolve_tag.outputs.tag }}"
          echo "suffix=$SUFFIX" >> $GITHUB_OUTPUT

      - name: Verify deployment health
        id: health_check
        run: |
          APP_URL="${{ steps.deploy.outputs.appUrl }}"
          echo "Deployed to: $APP_URL"
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve_tag.outputs.tag }}"

          HEALTHY="false"
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              HEALTHY="true"
              break
            fi
            echo "Waiting for container to start... (attempt $i/18, status: $STATUS)"
            sleep 10
          done

          echo "healthy=$HEALTHY" >> $GITHUB_OUTPUT
          if [ "$HEALTHY" != "true" ]; then
            echo "::error::Health check failed after 3 minutes"
          fi

      - name: Rollback on failure
        if: steps.health_check.outputs.healthy != 'true' && steps.current_revision.outputs.revision != ''
        run: |
          echo "::error::New revision unhealthy — rolling back to ${{ steps.current_revision.outputs.revision }}"
          # Deactivate the failed revision
          FAILED_REV="${{ env.CONTAINER_APP_NAME }}--${{ steps.new_revision.outputs.suffix }}"
          az containerapp revision deactivate \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision "$FAILED_REV" || true
          # Route all traffic back to the previous revision
          az containerapp ingress traffic set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --revision-weight "${{ steps.current_revision.outputs.revision }}=100"
          echo "Rollback complete. Previous revision restored."
          exit 1

      - name: Fail if unhealthy (no previous revision to rollback to)
        if: steps.health_check.outputs.healthy != 'true' && steps.current_revision.outputs.revision == ''
        run: |
          echo "::error::Health check failed and no previous revision exists for rollback"
          exit 1

      - name: Trigger data-repo initialization
        if: inputs.enable_git_sync && steps.health_check.outputs.healthy == 'true'
        run: |
          APP_URL="${{ steps.deploy.outputs.appUrl }}"
          echo "Triggering git data-repo init via ${APP_URL}/api/sync/init..."
          RESULT=$(curl -s -X POST "${APP_URL}/api/sync/init" -H "Content-Type: application/json")
          echo "$RESULT" | jq .
          OK=$(echo "$RESULT" | jq -r '.ok // false')
          if [ "$OK" != "true" ]; then
            echo "::warning::Data-repo init returned ok=$OK — the app will retry on next restart"
          fi
