name: Deploy to Azure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      enable_auth:
        description: 'Enforce sign-in gate (requires authorized-users.json on data volume)'
        required: false
        default: false
        type: boolean
      enable_git_sync:
        description: 'Enable GitHub data-sync feature (requires GH_* secrets set)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: read
  id-token: write  # For Azure OIDC login

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/taxonomy-editor
  RESOURCE_GROUP: ai-triad
  CONTAINER_APP_NAME: taxonomy-editor

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep template
        uses: azure/arm-deploy@v2
        id: deploy
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: deploy/azure/main.bicep
          parameters: >-
            containerImage=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            googleClientId=${{ secrets.GOOGLE_CLIENT_ID }}
            googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}
            githubClientId=${{ secrets.GH_OAUTH_CLIENT_ID }}
            githubClientSecret=${{ secrets.GH_OAUTH_CLIENT_SECRET }}
            authDisabled=${{ inputs.enable_auth && '' || '1' }}
            gitSyncEnabled=${{ inputs.enable_git_sync && '1' || '' }}
            githubRepo=${{ vars.SYNC_GITHUB_REPO }}
            githubAppId=${{ vars.SYNC_GITHUB_APP_ID }}
            githubAppInstallationId=${{ vars.SYNC_GITHUB_APP_INSTALLATION_ID }}
            githubAppPrivateKeySecretName=${{ vars.SYNC_GITHUB_APP_PRIVATE_KEY_SECRET_NAME }}
            githubWebhookSecret=${{ secrets.SYNC_GITHUB_WEBHOOK_SECRET }}

      - name: Update CORS with app URL
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars "ALLOWED_ORIGINS=${{ steps.deploy.outputs.appUrl }}"

      - name: Verify deployment
        run: |
          APP_URL="${{ steps.deploy.outputs.appUrl }}"
          echo "Deployed to: $APP_URL"
          echo "API keys: BYOK — users enter via app UI"

          # Wait for container to start (scale from zero)
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for container to start... (attempt $i/12, status: $STATUS)"
            sleep 10
          done

          echo "::warning::Health check did not pass within 2 minutes. Container may still be starting."
