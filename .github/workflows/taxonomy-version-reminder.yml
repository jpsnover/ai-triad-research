# taxonomy-version-reminder.yml
# Advisory check: warns if a PR modifies taxonomy files without bumping TAXONOMY_VERSION.
# This is a warning, NOT a hard block — human reviewers make the final call.

name: Taxonomy Version Reminder

on:
  pull_request:
    paths:
      - 'taxonomy/Origin/**'

jobs:
  check-version-bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if TAXONOMY_VERSION was updated
        id: version_check
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -q "taxonomy/Origin/"; then
            if echo "$CHANGED" | grep -q "TAXONOMY_VERSION"; then
              echo "bumped=true" >> $GITHUB_OUTPUT
            else
              echo "bumped=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "bumped=true" >> $GITHUB_OUTPUT
          fi

      - name: Warn if version not bumped
        if: steps.version_check.outputs.bumped == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "⚠️ **Taxonomy Version Reminder**\n\nThis PR modifies `taxonomy/` files but does not update `TAXONOMY_VERSION`.\n\nIf this change affects node meaning (MINOR) or structure (MAJOR), please bump `TAXONOMY_VERSION` before merging so the batch summarization script knows to reprocess affected documents.\n\nPATCH changes (typo fixes) do not require a version bump — reviewer discretion applies."
            })
